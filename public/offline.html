<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline – Ausaguide</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0d0d12;
      color: #fffffe;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      max-width: 420px;
      width: 90%;
      text-align: center;
      padding: 32px;
      background: rgba(127, 90, 240, 0.05);
      border: 1px solid rgba(127, 90, 240, 0.2);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      position: relative;
    }
    .glow {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(127, 90, 240, 0.3) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      margin: 16px 0 8px;
      letter-spacing: -0.025em;
    }
    p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 12px;
      display: inline-block;
      animation: float 4s ease-in-out infinite;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #7f5af0;
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 9999px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 4px 14px rgba(127, 90, 240, 0.3);
    }
    .btn:hover {
      background: #6b47d6;
      transform: scale(1.02);
    }
    .btn:active {
      transform: scale(0.98);
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glow"></div>
    <div class="icon">📡</div>
    <h1>You are Offline</h1>
    <p>It looks like you've lost your network connection. Once you're back online, try refreshing the page.</p>
    <button class="btn" onclick="window.location.reload(true)">Retry Connection</button>
  </div>
</body>
</html>
